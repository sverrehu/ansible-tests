# ansible-playbook -i localhost, playbook.yml
---
- name: Test
  hosts: localhost
  connection: local
  gather_facts: false
  
  vars:
    target: 2345
    foo:
      b1:
        port: 1234
      b2:
        port: "{{ target }}"
      b3:
        port: 3456
    foos: "{{ foo | community.general.json_query('*.{port: port}') | difference([{ 'port': target }]) }}"
      
  tasks:
    - name: Print it
      debug:
        var: foos

